services:
  wg-bot:
    build: .
    container_name: wg-bot
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./last_seen_erlangen.txt:/app/last_seen_erlangen.txt
      - ./last_seen_nuernberg.txt:/app/last_seen_nuernberg.txt
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Health check to ensure bot is running
    healthcheck:
      test: [ "CMD", "pgrep", "-f", "python.*bot.py" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
